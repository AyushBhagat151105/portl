name: Deploy Portl Server to Hostinger VPS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/server/**'
      - 'packages/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_SERVER: ghcr.io/ayushbhagat151105/portl-server

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_SERVER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/portl
            # Ensure the remote URL is set to SSH to use Deploy Keys
            git remote set-url origin git@github.com:AyushBhagat151105/portl.git
            # Pull using SSH and bypass host key check to prevent hanging prompts
            GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git pull origin master || GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git pull origin main
            
            # Authenticate Docker on VPS to pull packages
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull pre-built images and restart containers
            docker compose -f docker-compose.prod.yml pull || docker compose pull
            docker compose -f docker-compose.prod.yml up -d || docker compose up -d
            
            # Run database migrations inside the server container (which has Bun and Prisma)
            docker compose -f docker-compose.prod.yml exec -T server bun run --cwd /app/packages/db db:push || docker compose exec -T server bun run --cwd /app/packages/db db:push
            docker compose -f docker-compose.prod.yml exec -T server bun run --cwd /app/packages/db db:generate || docker compose exec -T server bun run --cwd /app/packages/db db:generate
            
            # Clean up credentials
            docker logout ghcr.io

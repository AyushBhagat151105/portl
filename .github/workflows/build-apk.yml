name: Build & Deploy Android APK (Zero Queue)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'apps/native/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: apk-build
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build APK Locally on GitHub Runner & Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Safeguard GitHub Free Tier minutes (allow up to 45m for full 27-30m builds)
    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC' -Dorg.gradle.daemon=false"
      JAVA_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Allocate 10GB Swap Space
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo fallocate -l 10G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Workspace Dependencies
        run: bun install

      - name: Cache Gradle Dependencies (Save Free Tier Minutes)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/package.json', '**/bun.lock', 'apps/native/android/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure Native Environment Secrets & google-services.json
        env:
          EXPO_PUBLIC_SERVER_URL: ${{ secrets.EXPO_PUBLIC_SERVER_URL }}
          EXPO_PUBLIC_AUTH_REDIRECT_PATH: ${{ secrets.EXPO_PUBLIC_AUTH_REDIRECT_PATH }}
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p apps/native
          echo "EXPO_PUBLIC_SERVER_URL=${EXPO_PUBLIC_SERVER_URL}" > apps/native/.env
          echo "EXPO_PUBLIC_AUTH_REDIRECT_PATH=${EXPO_PUBLIC_AUTH_REDIRECT_PATH}" >> apps/native/.env
          echo "EXPO_PUBLIC_EAS_PROJECT_ID=${EXPO_PUBLIC_EAS_PROJECT_ID}" >> apps/native/.env
          echo "EXPO_PUBLIC_RAZORPAY_KEY_ID=${EXPO_PUBLIC_RAZORPAY_KEY_ID}" >> apps/native/.env

          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > apps/native/google-services.json
            echo "Successfully decoded apps/native/google-services.json from secrets"
          else
            echo '{"project_info": {"project_number": "000000000000", "project_id": "placeholder"}}' > apps/native/google-services.json
            echo "Created placeholder apps/native/google-services.json"
          fi

          # Stage google-services.json so EAS CLI archive collector includes it
          cd apps/native
          git add -f google-services.json || true
          export GOOGLE_SERVICES_JSON="$(pwd)/google-services.json"

      - name: Setup Java 17 (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Global Gradle Properties & Metaspace Limits
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF

      - name: Write Pre-accepted Android SDK Licenses
        run: |
          for loc in "$ANDROID_HOME/licenses" "$HOME/.android/licenses" "/usr/local/lib/android/sdk/licenses"; do
            mkdir -p "$loc"
            printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\ne675675ecc063f1013a779156379a02302e1c312\n89330172575f56041019291ddf34e56ed61f5f2a" > "$loc/android-sdk-license"
            printf "84831b9409646a5780ed63065a6222623a7971a6" > "$loc/android-sdk-preview-license"
            printf "74659021008064a30704dd2b3780f2d4e0b57fa0" > "$loc/google-gdk-license"
            printf "601007b946f40b51617e2a94661ea33f4435867b" > "$loc/android-googletv-license"
            printf "33b6a2b6446236b60309267324816c61b9e2f014" > "$loc/android-googlexr-license"
          done

      - name: Install EAS CLI
        run: bun add -g eas-cli@latest

      - name: Build APK Locally (Zero Expo Queue)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd apps/native
          export GOOGLE_SERVICES_JSON="$(pwd)/google-services.json"
          eas build --platform android --profile preview --local --output ./portl.apk

      - name: Upload APK to VPS Storage via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "apps/native/portl.apk"
          target: "/root/portl/apps/server/uploads"
          strip_components: 2
          rm: true

      - name: Restart Server to Sync Metadata
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /root/portl/apps/server/uploads
            if [ -f "/root/portl/apps/server/uploads/apps/native/portl.apk" ]; then
              mv /root/portl/apps/server/uploads/apps/native/portl.apk /root/portl/apps/server/uploads/portl.apk
              rm -rf /root/portl/apps/server/uploads/apps
            fi

            # Copy APK directly into running container and restart
            docker exec portl-server mkdir -p /app/uploads || true
            docker cp /root/portl/apps/server/uploads/portl.apk portl-server:/app/uploads/portl.apk || true
            docker restart portl-server || true
            echo "Successfully updated portl.apk on VPS"

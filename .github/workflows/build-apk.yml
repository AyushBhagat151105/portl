name: Build & Deploy Android APK (Zero Queue)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'apps/native/**'
      - 'packages/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build APK Locally on GitHub Runner & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Workspace Dependencies
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: bun install

      - name: Configure Native Environment Secrets
        env:
          EXPO_PUBLIC_SERVER_URL: ${{ secrets.EXPO_PUBLIC_SERVER_URL }}
          EXPO_PUBLIC_AUTH_REDIRECT_PATH: ${{ secrets.EXPO_PUBLIC_AUTH_REDIRECT_PATH }}
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}
        run: |
          mkdir -p apps/native
          echo "EXPO_PUBLIC_SERVER_URL=${EXPO_PUBLIC_SERVER_URL}" > apps/native/.env
          echo "EXPO_PUBLIC_AUTH_REDIRECT_PATH=${EXPO_PUBLIC_AUTH_REDIRECT_PATH}" >> apps/native/.env
          echo "EXPO_PUBLIC_EAS_PROJECT_ID=${EXPO_PUBLIC_EAS_PROJECT_ID}" >> apps/native/.env
          echo "EXPO_PUBLIC_RAZORPAY_KEY_ID=${EXPO_PUBLIC_RAZORPAY_KEY_ID}" >> apps/native/.env

      - name: Setup Java 17 (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: bun add -g eas-cli@latest

      - name: Build APK Locally (Zero Expo Queue)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd apps/native
          eas build --platform android --profile preview --local --output ./portl.apk

      - name: Upload APK to VPS Storage via SCP
        uses: appleboy/scp-action@master
        with:
          host: srv1814748
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "apps/native/portl.apk"
          target: "/root/portl/apps/server/uploads/"
          rm: true

      - name: Restart Server to Sync Metadata
        uses: appleboy/ssh-action@master
        with:
          host: srv1814748
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker exec portl-server touch /tmp/reload || true
            echo "Successfully updated portl.apk on VPS"

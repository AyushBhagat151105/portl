name: Deploy Web Landing Page (Non-Docker Static)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:

jobs:
  deploy-web:
    name: Build Static Web Landing Page & SCP to Caddy Root
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Monorepo Dependencies
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: bun install

      - name: Build Web Application
        run: bun --cwd apps/web build

      - name: Deploy Static Bundle to VPS Caddy Web Root via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "apps/web/dist/*"
          target: "/var/www/portl-web"
          strip_components: 3
          rm: true

      - name: Reload Caddy Web Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl reload caddy || true
            echo "Successfully deployed portl.ayushbhagat.com static web landing page!"
